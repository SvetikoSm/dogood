# Не задавайте publish = ".next": Netlify отдаст папку как «голый» статик без маршрутизации
# к /_next/* — в итоге HTML есть, а CSS/JS/картинки 404 (как у «голого» HTML).
# Плагин OpenNext сам выставит нужную директорию публикации после сборки.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  command = "npm run build"

# Заявки с фото: у Netlify есть лимит размера тела запроса к функции (~6 MB на типичном тарифе).
# Если отправка падает с 413 — уменьшите размер снимков или сожмите их перед загрузкой.
