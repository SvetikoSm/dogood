# Next 16 по умолчанию собирает через Turbopack; адаптер Netlify (OpenNext) стабильнее работает с выводом webpack.
# Без --webpack на проде часто: HTML есть, а /_next/static/* → 404 → «голый» текст и долгая загрузка.
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Заявки с фото: лимит тела запроса к функции на Netlify ~6 MB — при 413 уменьшите фото.
